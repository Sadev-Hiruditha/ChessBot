<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess AI Coach</title>

    <!-- Modern chessboard-element -->
    <script type="module" src="https://unpkg.com/chessboard-element/bundled/chessboard-element.bundled.js"></script>

    <!-- Chess.js (UMD version for rules) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Chess AI Coach</h1>

    <!-- Modern chessboard -->
    <chess-board id="board" style="width: 400px; margin-bottom: 20px;"></chess-board>

    <textarea id="message" placeholder="Ask your coach..."></textarea>
    <button onclick="analyze()">Analyze Position</button>

    <!-- Changed from <pre> to <div> for proper HTML injection -->
    <div id="response"></div>

    <script src="script.js"></script>
</body>
</html>
